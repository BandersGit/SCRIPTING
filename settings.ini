[network]
hostname = office-router-01
ip_address = 192.168.1.100
subnet_mask = 255.255.255.0
gateway = 192.168.1.1
dns_primary = 8.8.8.8
dns_secondary = 8.8.4.4
domain = office.local

[firewall]
enabled = true
allow_ping = false
max_connections = 100
blocked_ports = 23,21,69

[logging]
enabled = true
log_level = warning
log_file = /var/log/system.log
max_log_size_mb = 50
log_rotation = daily

[ssh]
enabled = true
port = 22
permit_root_login = false
max_auth_attempts = 3
idle_timeout = 300

[ntp]
enabled = true
server_primary = pool.ntp.org
server_secondary = time.google.com
sync_interval = 3600

[backup]
enabled = true
destination = /mnt/backup
schedule = 02:00
retention_days = 30
